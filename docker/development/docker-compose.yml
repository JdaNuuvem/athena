version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s; timeout: 5s; retries: 3
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: { zookeeper: { condition: service_healthy } }
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 15s; timeout: 10s; retries: 5
    ports: ["9092:9092"]

  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: athena, POSTGRES_PASSWORD: athena, POSTGRES_DB: athena }
    healthcheck:
      test: pg_isready -U athena -d athena
      interval: 10s; timeout: 5s; retries: 5
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: redis-cli ping
      interval: 10s; timeout: 5s; retries: 5
    ports: ["6380:6379"]
    volumes: [redisdata:/data]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrantdata:/qdrant/storage]

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../pendencias/alertmanager-rules.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: athena
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports: ["3001:3000"]
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

  evolution-api:
    image: atendai/evolution-api:latest
    environment:
      AUTHENTICATION_API_KEY: athena-evolution-key
      AUTHENTICATION_TYPE: apikey
      SERVER_PORT: "8080"
      SERVER_TYPE: http
      DATABASE_ENABLED: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://athena:athena@postgres:5432/evolution
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      RABBITMQ_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: ""
      WEBHOOK_GLOBAL_EVENTS: ""
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: "ATHENA OS"
      CONFIG_SESSION_PHONE_NAME: "ATHENA"
      QRCODE_LIMIT: "5"
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports: ["9093:9093"]

  athena:
    build:
      context: ..
      dockerfile: docker/production/Dockerfile
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://athena:athena@postgres:5432/athena
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      KAFKA_BROKERS: kafka:9092
      PORT: "3000"; HOST: "0.0.0.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports: ["3000:3000"]
    healthcheck:
      test: curl -f http://localhost:3000/api/health || exit 1
      interval: 15s; timeout: 5s; retries: 5
    restart: unless-stopped

volumes:
  pgdata:; redisdata:; qdrantdata:; prometheus_data:; grafana_data:; evolution_instances:
